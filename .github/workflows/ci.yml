name: Manual Test Workflow

# Khi manual trigger
on:
  workflow_dispatch:

# Job Test
jobs:
  test:
    # Lựa chọn máy runner chạy
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Lấy source về
      - name: Clone/Checkout source code
        uses: actions/checkout@v4

      # Step 2: Cài đặt các thư viện phụ thuộc
      - name: Install dependencies
        run: |
          node --version
          npm --version
          pwd
          ls -la

      # Step 3: Run test
      - name: Run tests
        run: npm test